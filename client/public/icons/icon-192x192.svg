<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Printer body -->
  <rect x="36" y="70" width="120" height="60" rx="10" fill="white" opacity="0.95"/>
  <rect x="46" y="80" width="100" height="20" rx="4" fill="#e2e8f0"/>
  <!-- Paper coming out -->
  <rect x="56" y="38" width="80" height="50" rx="4" fill="url(#paper)" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Paper lines -->
  <line x1="68" y1="52" x2="112" y2="52" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="62" x2="104" y2="62" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="72" x2="96" y2="72" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <!-- Paper output tray -->
  <rect x="46" y="130" width="100" height="8" rx="4" fill="#e2e8f0"/>
  <!-- Status light -->
  <circle cx="142" cy="90" r="5" fill="#22c55e"/>
  <!-- Brand dot -->
  <circle cx="96" cy="155" r="6" fill="rgba(255,255,255,0.3)"/>
</svg>
