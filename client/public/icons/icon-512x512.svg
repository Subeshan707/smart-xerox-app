<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Printer body -->
  <rect x="96" y="186" width="320" height="160" rx="24" fill="white" opacity="0.95"/>
  <rect x="122" y="212" width="268" height="54" rx="10" fill="#e2e8f0"/>
  <!-- Paper coming out -->
  <rect x="148" y="100" width="216" height="134" rx="10" fill="url(#paper)" stroke="#cbd5e1" stroke-width="3"/>
  <!-- Paper lines -->
  <line x1="180" y1="138" x2="300" y2="138" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <line x1="180" y1="164" x2="280" y2="164" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <line x1="180" y1="190" x2="256" y2="190" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <!-- Paper output tray -->
  <rect x="122" y="346" width="268" height="20" rx="10" fill="#e2e8f0"/>
  <!-- Status light -->
  <circle cx="378" cy="240" r="12" fill="#22c55e"/>
  <!-- Brand dot -->
  <circle cx="256" cy="410" r="16" fill="rgba(255,255,255,0.3)"/>
</svg>
